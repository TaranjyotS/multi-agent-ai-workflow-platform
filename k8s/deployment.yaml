apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agent-api
  namespace: multi-agent-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multi-agent-api
  template:
    metadata:
      labels:
        app: multi-agent-api
    spec:
      containers:
        - name: api
          image: multi-agent-ai-workflow-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: multi-agent-config
            - secretRef:
                name: multi-agent-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
