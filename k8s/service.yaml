apiVersion: v1
kind: Service
metadata:
  name: multi-agent-api
  namespace: multi-agent-ai
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
spec:
  selector:
    app: multi-agent-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
